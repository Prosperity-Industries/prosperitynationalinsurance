# Workers Static Assets deploy for prosperitynationalinsurance.com
#
# - main: the Worker entry. Handles /api/lead, falls through to ASSETS.
# - [assets]: served by env.ASSETS.fetch(...) for all non-/api routes.

name = "prosperitynationalinsurance"
main = "src/worker.js"
compatibility_date = "2025-05-01"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"

# Run the Worker BEFORE static assets so /api/* routes are handled.
# (run_worker_first defaults to false in newer wrangler; setting explicit.)
run_worker_first = true
